name: CI-CD ClaimFlow

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test --if-present

      - name: Build Next.js
        run: npm run build

  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t claimflow-app .

      - name: Push Docker image
        run: |
          docker tag claimflow-app ${{ secrets.DOCKER_USERNAME }}/claimflow:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/claimflow:latest
