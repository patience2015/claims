name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./claimflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./claimflow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test
        
      # Facultatif: vous pouvez ajouter un linter ici
      # - name: Run Linter
      #   run: npm run lint

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test # Ce job attend que les tests passent
    
    defaults:
      run:
        working-directory: ./claimflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./claimflow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js project
        run: npm run build
        env:
          NEXTAUTH_URL: "https://claimflow.pages.dev"
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          # Prisma a besoin d'une URL de BDD même lors du build si SSR est utilisé
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'claimflow'
          directory: './claimflow/out'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
